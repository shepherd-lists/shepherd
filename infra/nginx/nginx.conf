events {}

http {
  # Docker's embedded DNS — re-resolve upstream names every 10s so nginx
  # recovers if a container is recreated and gets a new IP.
  resolver 127.0.0.11 valid=10s;

  # Shared headers for all proxied locations.
  # Pass original Host header through; webserver-next reads X-Forwarded-For
  # directly for its whitelist check (ipAllowLists.ts).
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Real-IP $remote_addr;

  server {
    listen 80;

    # Variable forces per-request DNS lookup (honours the resolver above).
    set $upstream webserver;

    # Known fixed routes
    location = /robots.txt           { proxy_pass http://$upstream:80; }
    location = /health-check         { proxy_pass http://$upstream:80; }
    location = /addresses.txt        { proxy_pass http://$upstream:80; }
    location = /blacklist.txt        { proxy_pass http://$upstream:80; }
    location = /rangelist.txt        { proxy_pass http://$upstream:80; }
    location = /reported/txids.txt   { proxy_pass http://$upstream:80; }

    # /rangeflagged.txt, /rangeowners.txt
    location ~ ^/range(flagged|owners)\.txt$  { proxy_pass http://$upstream:80; }

    # Dynamic addon routes: /<addon>/txids.txt, /<addon>/ranges.txt
    location ~ ^/[^/]+/(txids|ranges)\.txt$   { proxy_pass http://$upstream:80; }

    # Everything else: close the TCP connection with no response.
    location / { return 444; }
  }
}
