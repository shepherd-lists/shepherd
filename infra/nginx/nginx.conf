events {}

http {
  # Docker's embedded DNS — re-resolve upstream names every 10s so nginx
  # recovers if a container is recreated and gets a new IP.
  resolver 127.0.0.11 valid=10s;

  server {
    listen 80;

    location / {
      # Variable forces per-request DNS lookup (honours the resolver above).
      set $upstream webserver;
      proxy_pass http://$upstream:80;

      # Pass original Host header through.
      proxy_set_header Host $host;

      # Real client IP in X-Forwarded-For — webserver-next reads this header
      # directly for its whitelist check (ipAllowLists.ts).
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # Conventional header — not used by whitelist but handy for logs.
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
